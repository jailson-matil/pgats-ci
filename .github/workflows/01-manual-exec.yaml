# CI de Nível 01 - Disparo Manual através de clique

# nome da pipeline
name: "Execução Manual"

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch

on:
    workflow_dispatch:

#tarefas dentro da pipeline = jobs

jobs:
    #nome do job
    e2e-tests:
        # maquina onde o job vai rodar
        runs-on: ubuntu-latest

        # passos do job
        steps:
            # clone do projeto
            - uses: actions/checkout@v4

            # instalação do node
            - uses: actions/setup-node@v4
              with:
                  node-version: 24.x

            # instalação do Yarn
            - name: Instalando Yarn
              run: npm install -g yarn
            
            #   instalação das dependências
            - name: Instalando dependências
              run: yarn
            
            # instalação dos Browsers do Playwright
            - name: Instalando Browsers do Playwright
              run: yarn playwright install
            
            # executar os testes e2e
            - name: Executando testes e2e
              run: yarn run e2e
            
            - name: Compactar relatório
              if: always()
              run: zip -r artifacts.zip playwright-report test-results

            - name: Enviar e-mail
              if: always()
              uses: cinotify/github-action@main
              with:
                to: 'teste.pipeline@uorak.com'
                subject: 'Resultado da Pipeline'
                body: |
                  Pipeline executada.
                  Repositório: ${{ github.repository }}
                  Branch: ${{ github.ref_name }}
                  Status: ${{ job.status }}
                  attachment: 'artifacts.zip'